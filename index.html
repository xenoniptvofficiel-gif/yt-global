<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Watch — Veille YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#ffffff0f;--border-bright:#ffffff1a;--accent:#ff3e3e;--accent2:#ff8c00;--text:#f0f0f5;--muted:#6b6b80;--green:#00e676;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{position:relative;z-index:10;border-bottom:1px solid var(--border-bright);background:linear-gradient(180deg,#0d0d14 0%,transparent 100%);padding:0 24px;display:flex;align-items:stretch;flex-wrap:wrap;justify-content:space-between;min-height:64px}
.logo{display:flex;align-items:center;gap:10px;margin-right:32px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
nav{display:flex;gap:0;align-items:stretch}
.nav-btn{font-family:var(--sans);font-weight:700;font-size:13px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--muted);padding:0 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:#ffffff08}
.nav-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.header-meta{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;line-height:1.6;display:flex;align-items:center}
.header-meta strong{color:var(--green)}
.page{display:none}.page.active{display:block}
.container{position:relative;z-index:5;max-width:1400px;margin:0 auto;padding:20px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.card-title span{color:var(--accent);font-size:15px}
.btn{font-family:var(--sans);font-weight:700;font-size:12px;border:none;border-radius:7px;cursor:pointer;padding:8px 14px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#ff5555;transform:translateY(-1px)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border-bright)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border-bright)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:transparent;color:var(--accent);border:1px solid var(--accent)}.btn-danger:hover{background:var(--accent);color:#fff}
.kw-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:32px}
.kw-tag{background:var(--surface2);border:1px solid var(--border-bright);border-radius:16px;padding:4px 12px;font-size:12px;display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.kw-tag .remove{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;transition:color .2s}.kw-tag .remove:hover{color:var(--accent)}
.kw-add-row{display:flex;gap:8px}
.kw-add-row input,.manual-row input{background:var(--surface2);border:1px solid var(--border-bright);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;outline:none;transition:border-color .2s}
.kw-add-row input{flex:1;max-width:360px}.kw-add-row input:focus{border-color:var(--accent)}
.manual-row{display:flex;gap:8px;flex-wrap:wrap}.manual-row input{flex:1;min-width:220px}.manual-row input:focus{border-color:var(--green)}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;flex-direction:column;gap:2px;flex:1;min-width:110px}
.stat-pill .val{font-family:var(--mono);font-size:20px;font-weight:500}
.stat-pill .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.tabs{display:flex;gap:3px;background:var(--surface2);border-radius:9px;padding:3px}
.tab{font-family:var(--sans);font-weight:700;font-size:12px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px #0005}
.tab:hover:not(.active){color:var(--text)}
.toolbar-right{display:flex;align-items:center;gap:8px}
.toolbar-right input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;width:160px;transition:border-color .2s}
.toolbar-right input:focus{border-color:var(--accent)}
.view-toggle{display:flex;gap:3px;background:var(--surface2);border-radius:7px;padding:3px}
.view-btn{border:none;background:transparent;color:var(--muted);border-radius:5px;padding:5px 9px;cursor:pointer;font-size:14px;transition:all .2s}
.view-btn.active{background:var(--surface);color:var(--text)}
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sort-row label{font-size:11px;color:var(--muted)}
.sort-row select{background:var(--surface2);border:1px solid var(--border-bright);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 9px;outline:none;cursor:pointer}
.count-label{font-family:var(--mono);font-size:11px;color:var(--muted)}
.badge-count{background:var(--accent);color:#fff;border-radius:8px;font-family:var(--mono);font-size:9px;padding:1px 6px}
.badge-count.green{background:var(--green);color:#000}.badge-count.orange{background:var(--accent2);color:#000}
.sync-btn-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.last-sync{font-family:var(--mono);font-size:10px;color:var(--muted)}
.videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.video-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .2s,transform .2s;position:relative}
.video-card:hover{border-color:var(--border-bright);transform:translateY(-2px)}
.video-card.new-video{border-color:#00e67640}
.video-card.new-video::before{content:'NEW';position:absolute;top:7px;right:7px;background:var(--green);color:#000;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;z-index:2}
.video-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface)}
.video-info{padding:12px}
.video-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px}
.video-channel{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.video-views{font-family:var(--mono);font-size:11px;color:var(--accent2);font-weight:500}
.video-date{font-family:var(--mono);font-size:10px;color:var(--muted);width:100%;margin-top:3px}
.progress-bar{height:3px;background:var(--border-bright);border-radius:2px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s ease}
.progress-delta{font-family:var(--mono);font-size:10px;color:var(--green);margin-top:3px}
.progress-delta.negative{color:var(--accent)}
.kw-badges{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px}
.kw-badge{font-family:var(--mono);font-size:9px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px;color:var(--muted)}
.manual-badge{font-family:var(--mono);font-size:9px;background:#00e67615;border:1px solid #00e67640;border-radius:3px;padding:1px 5px;color:var(--green)}
.video-actions{padding:0 12px 12px;display:flex;gap:5px}
.videos-table-wrap{overflow-x:auto;border-radius:9px;border:1px solid var(--border)}
.videos-table{width:100%;border-collapse:collapse;font-size:12px}
.videos-table thead tr{background:var(--surface2);border-bottom:1px solid var(--border-bright)}
.videos-table th{padding:10px 14px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.videos-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.videos-table tr:last-child td{border-bottom:none}.videos-table tr:hover td{background:var(--surface2)}
.table-thumb{width:72px;aspect-ratio:16/9;object-fit:cover;border-radius:5px;display:block;background:var(--surface)}
.table-title{font-weight:600;max-width:300px}.table-title a{color:var(--text);text-decoration:none}.table-title a:hover{color:var(--accent2)}
.table-views{font-family:var(--mono);font-size:12px;color:var(--accent2);font-weight:500;white-space:nowrap}
.table-delta{font-family:var(--mono);font-size:11px;color:var(--green);white-space:nowrap}.table-delta.neg{color:var(--accent)}
.table-date{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .emoji{font-size:42px;margin-bottom:14px}
.empty-state h3{font-size:16px;margin-bottom:7px;color:var(--text)}.empty-state p{font-size:13px}
.loading-overlay{display:none;position:fixed;inset:0;background:#0a0a0fcc;z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(4px)}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-family:var(--mono);font-size:12px;color:var(--text)}
.loading-log{font-family:var(--mono);font-size:10px;color:var(--muted);max-width:400px;text-align:center;line-height:1.8;white-space:pre-wrap}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surface2);border:1px solid var(--border-bright);border-radius:9px;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease;max-width:320px}
.toast.success{border-color:#00e67640}.toast.error{border-color:var(--accent)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}

/* ── CLASSEMENT ── */
.period-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.period-btn{font-family:var(--sans);font-weight:700;font-size:12px;padding:7px 16px;border:1px solid var(--border-bright);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.period-btn:hover{color:var(--text);border-color:var(--accent)}
.period-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.custom-range{display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--surface2);border-radius:10px;border:1px solid var(--border-bright);margin-top:10px}
.custom-range.show{display:flex}
.custom-range label{font-size:11px;color:var(--muted);font-family:var(--mono)}
.custom-range input[type=date]{background:var(--surface);border:1px solid var(--border-bright);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;outline:none;cursor:pointer;color-scheme:dark}
.custom-range input[type=date]:focus{border-color:var(--accent)}
.rank-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
.rank-table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table thead tr{background:var(--surface2);border-bottom:1px solid var(--border-bright)}
.rank-table th{padding:12px 16px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .2s}
.rank-table th:hover{color:var(--text)}
.rank-table th.sorted{color:var(--accent2)}
.rank-table td{padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}.rank-table tr:hover td{background:var(--surface2)}
.rank-num{font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;min-width:36px}
.rank-thumb{width:80px;aspect-ratio:16/9;object-fit:cover;border-radius:6px;display:block;background:var(--surface)}
.rank-title{font-weight:600;line-height:1.4;max-width:340px}
.rank-title a{color:var(--text);text-decoration:none}.rank-title a:hover{color:var(--accent2)}
.rank-channel{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.rank-views{font-family:var(--mono);font-size:13px;color:var(--accent2);font-weight:500;white-space:nowrap}
.rank-gain{font-family:var(--mono);font-size:12px;white-space:nowrap;font-weight:500}
.rank-gain.up{color:var(--green)}.rank-gain.down{color:var(--accent)}.rank-gain.flat{color:var(--muted)}
.rank-bar{height:4px;background:var(--border-bright);border-radius:2px;overflow:hidden;width:120px}
.rank-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.rank-date{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.period-badge{font-family:var(--mono);font-size:11px;color:var(--accent2);padding:5px 12px;background:var(--surface2);border-radius:6px;border:1px solid var(--border-bright)}
.rank-top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <h1>IPTV <span>Watch</span></h1>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('veille',this)">🏠 Accueil</button>
    <button class="nav-btn" onclick="showPage('classement',this)">🏆 Classement</button>
  </nav>
  <div class="header-meta">
    Veille YouTube automatisée<br>
    Dernière synchro : <strong id="lastSyncHeader">—</strong>
  </div>
</header>

<!-- PAGE VEILLE -->
<div id="page-veille" class="page active">
<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>🏷</span> Mots-clés de veille</div>
      <div class="sync-btn-wrap">
        <span class="last-sync" id="lastSyncText"></span>
        <button class="btn btn-primary" id="syncBtn" onclick="runSync()">⚡ Synchroniser</button>
      </div>
    </div>
    <div class="kw-list" id="kwList"></div>
    <div class="kw-add-row">
      <input type="text" id="kwInput" placeholder="Nouveau mot-clé..." onkeydown="if(event.key==='Enter') addKeyword()"/>
      <button class="btn btn-secondary" onclick="addKeyword()">+ Ajouter</button>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title"><span>🔗</span> Ajouter une vidéo manuellement</div></div>
    <div class="manual-row">
      <input type="text" id="manualUrl" placeholder="https://www.youtube.com/watch?v=..."/>
      <button class="btn btn-secondary" onclick="addManual()">+ Ajouter</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-pill"><div class="val" id="statTotal">0</div><div class="lbl">Vidéos suivies</div></div>
    <div class="stat-pill"><div class="val" id="statNew" style="color:var(--green)">0</div><div class="lbl">Nouvelles (24h)</div></div>
    <div class="stat-pill"><div class="val" id="statTop" style="color:var(--accent2)">0</div><div class="lbl">Top 6 mois</div></div>
    <div class="stat-pill"><div class="val" id="statManual">0</div><div class="lbl">Manuelles</div></div>
  </div>
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all',this)">Toutes <span class="badge-count" id="badgeAll">0</span></button>
      <button class="tab" onclick="switchTab('new',this)">Nouvelles <span class="badge-count green" id="badgeNew">0</span></button>
      <button class="tab" onclick="switchTab('top',this)">Top 6 mois <span class="badge-count orange" id="badgeTop">0</span></button>
      <button class="tab" onclick="switchTab('manual',this)">Manuelles</button>
    </div>
    <div class="toolbar-right">
      <input type="text" id="searchFilter" placeholder="Filtrer..." oninput="renderVideos()"/>
      <div class="view-toggle">
        <button class="view-btn active" title="Cartes" onclick="setView('cards',this)">⊞</button>
        <button class="view-btn" title="Tableau" onclick="setView('table',this)">≡</button>
      </div>
    </div>
  </div>
  <div class="sort-row">
    <div style="display:flex;gap:8px;align-items:center">
      <label>Trier par</label>
      <select id="sortSelect" onchange="renderVideos()">
        <option value="views_desc">Vues ↓</option>
        <option value="views_asc">Vues ↑</option>
        <option value="date_desc">Date ↓</option>
        <option value="date_asc">Date ↑</option>
        <option value="delta_desc">Progression ↓</option>
      </select>
    </div>
    <span id="countLabel" class="count-label">0 vidéos</span>
  </div>
  <div id="videoContainer"></div>
</div>
</div>

<!-- PAGE CLASSEMENT -->
<div id="page-classement" class="page">
<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>🏆</span> Classement par période</div>
      <span class="period-badge" id="periodBadge">—</span>
    </div>
    <div class="period-filters">
      <button class="period-btn active" onclick="setPeriod('today',this)">Aujourd'hui</button>
      <button class="period-btn" onclick="setPeriod('yesterday',this)">Hier</button>
      <button class="period-btn" onclick="setPeriod('7d',this)">7 derniers jours</button>
      <button class="period-btn" onclick="setPeriod('30d',this)">30 derniers jours</button>
      <button class="period-btn" onclick="setPeriod('custom',this)">📅 Personnalisé</button>
    </div>
    <div class="custom-range" id="customRange">
      <label>Du</label>
      <input type="date" id="dateFrom" oninput="applyCustomRange()"/>
      <label>au</label>
      <input type="date" id="dateTo" oninput="applyCustomRange()"/>
    </div>
  </div>

  <div class="stats-bar" id="rankStats"></div>

  <div class="rank-top-bar">
    <span class="count-label" id="rankCount">0 vidéos</span>
    <input type="text" id="rankSearch" placeholder="Filtrer..." oninput="renderRanking()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;width:200px"/>
  </div>

  <div class="rank-table-wrap">
    <table class="rank-table">
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th style="width:96px"></th>
          <th onclick="rankSort('title')">Vidéo</th>
          <th onclick="rankSort('views')" id="th-views">Vues</th>
          <th onclick="rankSort('gain')" id="th-gain" class="sorted">Gain période ↓</th>
          <th>Barre</th>
          <th onclick="rankSort('date')" id="th-date">Publiée</th>
        </tr>
      </thead>
      <tbody id="rankBody">
        <tr><td colspan="7" style="text-align:center;padding:50px;color:var(--muted);font-family:var(--mono);font-size:12px">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Chargement...</div>
  <div class="loading-log" id="loadingLog"></div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  CONFIG

async function ytSearch({q,order,publishedAfter,maxPages=4}){
  const ids=[];let pageToken='';
  for(let p=0;p<maxPages;p++){
    const u=new URL('https://www.googleapis.com/youtube/v3/search');
    u.searchParams.set('key',YOUTUBE_API_KEY);
    u.searchParams.set('part','id');
    u.searchParams.set('type','video');
    u.searchParams.set('q',q);
    u.searchParams.set('order',order);
    u.searchParams.set('maxResults','50');
    u.searchParams.set('relevanceLanguage','fr');
    u.searchParams.set('regionCode','FR');
    if(publishedAfter)u.searchParams.set('publishedAfter',publishedAfter);
    if(pageToken)u.searchParams.set('pageToken',pageToken);
    const r=await fetch(u);if(!r.ok)break;
    const data=await r.json();
    (data.items||[]).forEach(i=>ids.push(i.id.videoId));
    pageToken=data.nextPageToken||'';
    if(!pageToken)break;
    await sleep(150);
  }
  return ids
}
async function ytStats(ids){
  if(!ids.length)return[];
  const u=new URL('https://www.googleapis.com/youtube/v3/videos');
  u.searchParams.set('key',YOUTUBE_API_KEY);u.searchParams.set('part','snippet,statistics');u.searchParams.set('id',ids.join(','));
  const r=await fetch(u);if(!r.ok)throw new Error('YT stats '+r.status);
  return(await r.json()).items||[]
}
function ytId(s){const m=s.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:(s.trim().length===11?s.trim():null)}

async function init(){
  showLoading('Chargement...');
  try{
    const[kws,ls,vids,h]=await Promise.all([dbGetKw(),dbGet('last_sync'),dbGetVideos(),dbGetHistory()]);
    keywords=kws.length?kws:DEFAULT_KW;
    if(!kws.length)await dbSetKw(keywords);
    lastSync=ls;videos=vids;hist={};
    h.forEach(r=>{if(!hist[r.video_id])hist[r.video_id]=[];hist[r.video_id].push({recorded_at:r.recorded_at,views:r.views})});
    renderKw();renderVideos();updateStats();updateSyncDisplay();checkAutoSync();
  }catch(e){toast('❌ Erreur : '+e.message,'error')}
  finally{hideLoading()}
}
function checkAutoSync(){if(!lastSync)return;if(Date.now()-new Date(lastSync).getTime()>=24*3600*1000)runSync()}

//  SYNC
// ══════════════════════════════════════════════════════
async function runSync(){
  if(!keywords.length)return toast('⚠️ Aucun mot-clé','error');
  const btn=document.getElementById('syncBtn');btn.disabled=true;
  showLoading('Synchronisation en cours...');
  const now=new Date(),d6m=new Date(now),d24h=new Date(now);
  d6m.setMonth(d6m.getMonth()-6);d24h.setDate(d24h.getDate()-1);
  const newIds=new Set(),topIds=new Set();
  try{
    for(const kw of keywords){
      logLoading(`🔍 "${kw}"`);
      try{const ids=await ytSearch({q:kw,order:'date',publishedAfter:d24h.toISOString()});ids.forEach(id=>newIds.add(id));logLoading(`  24h: ${ids.length}`)}catch(e){logLoading(`  ⚠️ ${e.message}`)}
      try{const ids=await ytSearch({q:kw,order:'viewCount',publishedAfter:d6m.toISOString(),maxPages:6});ids.forEach(id=>topIds.add(id));logLoading(`  Top6m: ${ids.length}`)}catch(e){logLoading(`  ⚠️ ${e.message}`)}
      await sleep(200)
    }
    const allIds=[...new Set([...newIds,...topIds,...videos.map(v=>v.id)])];
    logLoading(`\n📊 ${allIds.length} vidéos...`);
    let items=[];
    for(const chunk of chunk50(allIds)){items=items.concat(await ytStats(chunk));await sleep(100)}
    const today=now.toISOString().split('T')[0];
    const vRows=items.map(item=>{
      const id=item.id,views=parseInt(item.statistics?.viewCount||0,10),ex=videos.find(v=>v.id===id);
      const matched=keywords.filter(kw=>(item.snippet.title||'').toLowerCase().includes(kw));
      return{id,title:item.snippet.title,channel:item.snippet.channelTitle,published_at:item.snippet.publishedAt,
        thumbnail:item.snippet.thumbnails?.medium?.url||item.snippet.thumbnails?.default?.url,
        views,is_new:newIds.has(id),is_top6m:topIds.has(id),is_manual:ex?.is_manual||false,
        matched_keywords:matched.length?matched:(ex?.matched_keywords||[]),
        first_seen:ex?.first_seen||now.toISOString(),last_updated:now.toISOString()}
    });
    await dbUpsertVideos(vRows);
    await dbUpsertHistory(items.map(item=>({video_id:item.id,recorded_at:today,views:parseInt(item.statistics?.viewCount||0)})));
    await dbSet('last_sync',now.toISOString());
    videos=await dbGetVideos();
    const allH=await dbGetHistory();hist={};
    allH.forEach(r=>{if(!hist[r.video_id])hist[r.video_id]=[];hist[r.video_id].push({recorded_at:r.recorded_at,views:r.views})});
    lastSync=now.toISOString();
    updateStats();updateSyncDisplay();renderVideos();hideLoading();
    toast(`✅ ${items.length} vidéos mises à jour`,'success')
  }catch(e){hideLoading();toast(`❌ ${e.message}`,'error')}
  finally{btn.disabled=false}
}

async function addManual(){
  const input=document.getElementById('manualUrl').value.trim();if(!input)return;
  const id=ytId(input);if(!id)return toast('URL invalide','error');
  if(videos.find(v=>v.id===id))return toast('Déjà suivie','error');
  showLoading('Chargement...');
  try{
    const items=await ytStats([id]);if(!items.length){hideLoading();return toast('Introuvable','error')}
    const item=items[0],now=new Date(),views=parseInt(item.statistics?.viewCount||0);
    const row={id,title:item.snippet.title,channel:item.snippet.channelTitle,published_at:item.snippet.publishedAt,
      thumbnail:item.snippet.thumbnails?.medium?.url,views,is_new:false,is_top6m:false,is_manual:true,
      matched_keywords:[],first_seen:now.toISOString(),last_updated:now.toISOString()};
    await dbUpsertVideos([row]);
    await dbUpsertHistory([{video_id:id,recorded_at:now.toISOString().split('T')[0],views}]);
    videos.push(row);document.getElementById('manualUrl').value='';
    updateStats();renderVideos();hideLoading();toast('✅ Vidéo ajoutée','success')
  }catch(e){hideLoading();toast(`❌ ${e.message}`,'error')}
}
async function removeVideo(id){
  if(!confirm('Supprimer ?'))return;
  await dbDeleteVideo(id);videos=videos.filter(v=>v.id!==id);delete hist[id];
  updateStats();renderVideos();toast('Supprimée','success')
}

function getDelta(id){const h=hist[id]||[];if(h.length<2)return 0;return h[h.length-1].views-h[h.length-2].views}
function getFiltered(){
  const s=document.getElementById('searchFilter').value.toLowerCase();
  let vids=[...videos];
  if(curTab==='new')vids=vids.filter(v=>v.is_new);
  else if(curTab==='top')vids=vids.filter(v=>v.is_top6m);
  else if(curTab==='manual')vids=vids.filter(v=>v.is_manual);
  if(s)vids=vids.filter(v=>(v.title||'').toLowerCase().includes(s)||(v.channel||'').toLowerCase().includes(s));
  const so=document.getElementById('sortSelect').value;
  vids.sort((a,b)=>{
    if(so==='views_desc')return parseInt(b.views||0)-parseInt(a.views||0);if(so==='views_asc')return parseInt(a.views||0)-parseInt(b.views||0);
    if(so==='date_desc')return new Date(b.published_at)-new Date(a.published_at);
    if(so==='date_asc')return new Date(a.published_at)-new Date(b.published_at);
    if(so==='delta_desc')return getDelta(b.id)-getDelta(a.id);return 0
  });return vids
}

  if(curView==='cards'){
    const maxV=Math.max(...vids.map(v=>v.views),1);
    c.innerHTML='<div class="videos-grid">'+vids.map(v=>{
      const delta=getDelta(v.id),ds=fDelta(delta),pct=Math.min(100,(v.views/maxV)*100).toFixed(1);

          <div class="video-title">${esc(v.title)}</div>
          <div class="video-meta"><div class="video-channel">${esc(v.channel)}</div><div class="video-views">👁 ${fv(v.views)}</div><div class="video-date">📅 ${fd(v.published_at)}</div></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          ${ds?`<div class="progress-delta ${delta<0?'negative':''}">${ds}</div>`:''}
          <div class="kw-badges">${badges}${v.is_manual?'<span class="manual-badge">manuel</span>':''}</div>
        </div>
        <div class="video-actions">
          <a href="https://youtu.be/${v.id}" target="_blank" class="btn btn-ghost btn-sm">▶ Ouvrir</a>
          <button class="btn btn-danger btn-sm" onclick="removeVideo('${v.id}')">✕</button>
        </div>
      </div>`
    }).join('')+'</div>'
  }else{
    c.innerHTML='<div class="videos-table-wrap"><table class="videos-table"><thead><tr><th>#</th><th>Thumb</th><th>Titre / Chaîne</th><th>Vues</th><th>Progression</th><th>Publiée</th><th></th></tr></thead><tbody>'+
    vids.map((v,i)=>{const delta=getDelta(v.id),ds=fDelta(delta);return`<tr>
      <td style="color:var(--muted);font-family:var(--mono);font-size:10px">${i+1}</td>
      <td><img class="table-thumb" src="${v.thumbnail||''}" alt="" onerror="this.style.display='none'"></td>
      <td class="table-title"><a href="https://youtu.be/${v.id}" target="_blank">${esc(v.title)}</a><br><span style="font-size:10px;color:var(--muted);font-family:var(--mono)">${esc(v.channel)}</span></td>
      <td class="table-views">👁 ${fv(v.views)}</td>
      <td class="table-delta ${delta<0?'neg':''}">${ds||'—'}</td>
      <td class="table-date">${fd(v.published_at)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeVideo('${v.id}')">✕</button></td>
    </tr>`}).join('')+'</tbody></table></div>'

function toDs(d){return d.toISOString().split('T')[0]}
function getPeriod(){
  const now=new Date(),today=toDs(now),yest=toDs(new Date(now-864e5));
  if(rPeriod==='today')return{from:today,to:today,label:"Aujourd'hui"}
  if(rPeriod==='yesterday')return{from:yest,to:yest,label:'Hier'}
  if(rPeriod==='7d')return{from:toDs(new Date(now-6*864e5)),to:today,label:'7 derniers jours'}
  if(rPeriod==='30d')return{from:toDs(new Date(now-29*864e5)),to:today,label:'30 derniers jours'}
  if(rPeriod==='custom'&&rFrom&&rTo)return{from:rFrom,to:rTo,label:`${fdS(rFrom)} → ${fdS(rTo)}`}
  return null
}
function getViewsAt(vid,date){
  const h=hist[vid]||[],m=h.filter(e=>e.recorded_at<=date);
  return m.length?m[m.length-1].views:null
}
function setPeriod(p,btn){
  rPeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('customRange').classList.toggle('show',p==='custom');
  if(p!=='custom')renderRanking()
}
function applyCustomRange(){
  rFrom=document.getElementById('dateFrom').value;rTo=document.getElementById('dateTo').value;
  if(rFrom&&rTo)renderRanking()
}
function rankSort(col){
  if(rSortCol===col)rSortDir*=-1;else{rSortCol=col;rSortDir=-1}
  // Reset all headers
  ['th-views','th-gain','th-date'].forEach(id=>{const el=document.getElementById(id);if(el){const base=el.textContent.replace(/ [↑↓]$/,'');el.textContent=base;el.classList.remove('sorted')}})
  const map={views:'th-views',gain:'th-gain',date:'th-date'};
  if(map[col]){const el=document.getElementById(map[col]);if(el){el.textContent=el.textContent+(rSortDir===-1?' ↓':' ↑');el.classList.add('sorted')}}
  renderRanking()
}
function renderRanking(){
  const period=getPeriod();
  if(!period){document.getElementById('rankBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:50px;color:var(--muted);font-family:var(--mono);font-size:12px">Sélectionne une plage de dates</td></tr>';return}
  document.getElementById('periodBadge').textContent=period.label;
  const search=(document.getElementById('rankSearch')?.value||'').toLowerCase();
  let data=videos
    .filter(v=>!search||(v.title||'').toLowerCase().includes(search)||(v.channel||'').toLowerCase().includes(search))
    .map(v=>{
      const ve=getViewsAt(v.id,period.to)??v.views;
      const vs=getViewsAt(v.id,period.from);
      return{...v,ve,vs,gain:vs!=null?ve-vs:null}
    });
  // Sort
  data.sort((a,b)=>{
    if(rSortCol==='gain'){const av=a.gain??-Infinity,bv=b.gain??-Infinity;return rSortDir*(bv-av)}
    if(rSortCol==='views')return rSortDir*(b.ve-a.ve)
    if(rSortCol==='title')return rSortDir*(a.title||'').localeCompare(b.title||'')
    if(rSortCol==='date')return rSortDir*(new Date(b.published_at)-new Date(a.published_at))
    return rSortDir*(b.ve-a.ve)
  });
  document.getElementById('rankCount').textContent=data.length+' vidéo'+(data.length!==1?'s':'');
  const maxV=Math.max(...data.map(v=>v.ve),1);
  const totalGain=data.reduce((s,v)=>s+(v.gain||0),0);
  const progressing=data.filter(v=>v.gain!=null&&v.gain>0).length;
  document.getElementById('rankStats').innerHTML=`
    <div class="stat-pill"><div class="val" style="color:var(--accent2)">${fv(Math.max(...data.map(v=>v.ve),0))}</div><div class="lbl">Record vues</div></div>
    <div class="stat-pill"><div class="val" style="color:var(--green)">${totalGain>=0?'+':''}${fv(totalGain)}</div><div class="lbl">Gain total</div></div>
    <div class="stat-pill"><div class="val">${progressing}</div><div class="lbl">En progression</div></div>
    <div class="stat-pill"><div class="val">${data.length}</div><div class="lbl">Vidéos</div></div>
  `;
  if(!data.length){document.getElementById('rankBody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:50px;color:var(--muted);font-family:var(--mono);font-size:12px">Aucune vidéo</td></tr>';return}
  document.getElementById('rankBody').innerHTML=data.map((v,i)=>{
    const rank=i+1;
    const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const gs=v.gain!=null?(v.gain>0?`+${fv(v.gain)}`:v.gain<0?`-${fv(Math.abs(v.gain))}`:'—'):'—';
    const gc=v.gain>0?'up':v.gain<0?'down':'flat';
    const pct=Math.min(100,(v.ve/maxV)*100).toFixed(1);
    return`<tr>
      <td class="rank-num">${medal}</td>
      <td><img class="rank-thumb" src="${v.thumbnail||''}" alt="" onerror="this.style.display='none'"></td>
      <td><div class="rank-title"><a href="https://youtu.be/${v.id}" target="_blank">${esc(v.title)}</a></div><div class="rank-channel">${esc(v.channel)}</div></td>
      <td class="rank-views">👁 ${fv(v.ve)}</td>
      <td class="rank-gain ${gc}">${gs}</td>
      <td><div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%"></div></div></td>
      <td class="rank-date">${fd(v.published_at)}</td>
    </tr>`
  }).join('')
}

// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════
function showLoading(t){document.getElementById('loadingOverlay').classList.add('show');document.getElementById('loadingText').textContent=t;document.getElementById('loadingLog').textContent=''}
function logLoading(m){document.getElementById('loadingLog').textContent+=m+'\n'}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=msg;document.getElementById('toastContainer').appendChild(el);setTimeout(()=>el.remove(),4000)}
function fv(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return(n||0).toLocaleString('fr')}
function fd(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}
function fdS(s){if(!s)return'—';return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}
function fDelta(d){if(!d)return'';return(d>0?'+':'')+fv(d)+' vues'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function chunk50(arr){const c=[];for(let i=0;i<arr.length;i+=50)c.push(arr.slice(i,i+50));return c}
